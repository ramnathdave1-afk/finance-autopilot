name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r --filter='./packages/**' --filter='./apps/**' typecheck

      - name: Test
        run: pnpm -r --filter='./packages/**' --filter='@fa/mobile' test

      # scripts/ is not a workspace package, so the recursive test run above
      # skips it. Run the catalog-builder tests explicitly so the Stripe price
      # catalog can't drift from products.ts / .env.example unnoticed.
      - name: Test scripts
        run: pnpm test:scripts

      # apps/web is a Next.js project — build verifies route + page integrity.
      - name: Build web
        run: pnpm --filter @fa/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
